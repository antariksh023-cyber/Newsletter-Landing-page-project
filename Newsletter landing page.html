<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe To My Newsletter</title>
    <link rel="icon" type="image/png" href="pfp.png">
</head>

<body>

    <style>
        body {
            background-color: black;
            min-height: 100vh;
            margin: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: white;
            font-weight: bold;
            font-size: 40px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0 0 30px 0;
        }

        h1:hover {
            color: #485e43;
        }

        img {
            border-radius: 50px;
            background-color: white;
            height: 700px;
            border: solid;
        }

        form {
            margin: 0;
        }

        input[type="email"] {
            width: 492px;
            color: black;
            font-size: 25px;
            font-weight: bold;
            height: 50px;
            text-align: center;
            display: block;
        }

        input[type="email"]:hover {
            background-color: black;
            color: grey;
            box-shadow: 5px 5px 5px white;
        }

        button {
            padding-bottom: 10px;
            margin-top: 10px;
            width: 500px;
            background-color: #485e43;
            height: 40px;
            font-weight: bold;
            font-size: 22px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        button:hover {
            background-color: black;
            color: white;
            box-shadow: 5px 5px 5px white;
        }
    </style>

    <div style="display: flex; align-items: center; gap: 80px; max-width: 1400px; padding: 20px;">
        <img src="pfp.png" width="700px">

        <div>
            <h1>Subscribe To My Newsletter</h1>

            <form>
                <input type="email" placeholder="Email Address"> <br> <br>

                <button>SUBSCRIBE</button>
            </form>
        </div>
    </div>

</body>

</html>
